<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Favicon Options</title>
<style>
body{background:#f5f5f7;font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;padding:40px;gap:40px}
h1{font-size:28px;font-weight:700;color:#1d1d1f}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:40px}
.option{text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.option img{width:120px;height:120px;border-radius:22px;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.option .small{width:32px;height:32px;border-radius:7px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.option .tiny{width:16px;height:16px;border-radius:3px}
.label{font-size:13px;font-weight:600;color:#666}
.sizes{display:flex;align-items:center;gap:12px;margin-top:4px}
</style></head><body>
<h1>MovilNova Favicon Options</h1>
<div class="grid">
  <div class="option">
    <img src="option1-gradient.svg">
    <div class="sizes"><img src="option1-gradient.svg" class="small"><img src="option1-gradient.svg" class="tiny"></div>
    <span class="label">1. Brand Gradient</span>
  </div>
  <div class="option">
    <img src="option2-minimal.svg">
    <div class="sizes"><img src="option2-minimal.svg" class="small"><img src="option2-minimal.svg" class="tiny"></div>
    <span class="label">2. Dark Minimal</span>
  </div>
  <div class="option">
    <img src="option3-symbol.svg">
    <div class="sizes"><img src="option3-symbol.svg" class="small"><img src="option3-symbol.svg" class="tiny"></div>
    <span class="label">3. Phone Symbol</span>
  </div>
  <div class="option">
    <img src="option4-bold.svg">
    <div class="sizes"><img src="option4-bold.svg" class="small"><img src="option4-bold.svg" class="tiny"></div>
    <span class="label">4. Abstract M</span>
  </div>
  <div class="option">
    <img src="option5-glass.svg">
    <div class="sizes"><img src="option5-glass.svg" class="small"><img src="option5-glass.svg" class="tiny"></div>
    <span class="label">5. Glass M</span>
  </div>
</div>
</body></html>
