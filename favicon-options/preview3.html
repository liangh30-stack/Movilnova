<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Favicon Pro</title>
<style>
body{background:#0a0a0a;font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;padding:40px;gap:40px}
h1{font-size:28px;font-weight:700;color:#fff}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:40px}
.option{text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.option img{width:140px;height:140px;border-radius:30px;box-shadow:0 8px 32px rgba(0,255,184,0.15)}
.option .small{width:32px;height:32px;border-radius:7px;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.option .tiny{width:16px;height:16px;border-radius:3px}
.label{font-size:13px;font-weight:600;color:#888}
.sizes{display:flex;align-items:center;gap:16px;margin-top:4px}
.tab{display:flex;align-items:center;gap:8px;background:#222;padding:6px 16px;border-radius:8px 8px 0 0;margin-top:8px}
.tab img{width:16px;height:16px;border-radius:3px}
.tab span{color:#999;font-size:12px}
</style></head><body>
<h1>MovilNova — Premium Favicon</h1>
<div class="grid">
  <div class="option">
    <img src="option-pro1.svg">
    <div class="sizes"><img src="option-pro1.svg" class="small"><img src="option-pro1.svg" class="tiny"></div>
    <div class="tab"><img src="option-pro1.svg"><span>MovilNova</span></div>
    <span class="label">Phone + Bolt</span>
  </div>
  <div class="option">
    <img src="option-pro2.svg">
    <div class="sizes"><img src="option-pro2.svg" class="small"><img src="option-pro2.svg" class="tiny"></div>
    <div class="tab"><img src="option-pro2.svg"><span>MovilNova</span></div>
    <span class="label">Flowing M</span>
  </div>
  <div class="option">
    <img src="option-pro3.svg">
    <div class="sizes"><img src="option-pro3.svg" class="small"><img src="option-pro3.svg" class="tiny"></div>
    <div class="tab"><img src="option-pro3.svg"><span>MovilNova</span></div>
    <span class="label">Nova Star</span>
  </div>
  <div class="option">
    <img src="option-pro4.svg">
    <div class="sizes"><img src="option-pro4.svg" class="small"><img src="option-pro4.svg" class="tiny"></div>
    <div class="tab"><img src="option-pro4.svg"><span>MovilNova</span></div>
    <span class="label">Phone + Gear</span>
  </div>
  <div class="option">
    <img src="option-pro5.svg">
    <div class="sizes"><img src="option-pro5.svg" class="small"><img src="option-pro5.svg" class="tiny"></div>
    <div class="tab"><img src="option-pro5.svg"><span>MovilNova</span></div>
    <span class="label">Geometric M</span>
  </div>
</div>
</body></html>
