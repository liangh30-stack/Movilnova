<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Favicon Options v2</title>
<style>
body{background:#f5f5f7;font-family:-apple-system,sans-serif;display:flex;flex-direction:column;align-items:center;padding:40px;gap:40px}
h1{font-size:28px;font-weight:700;color:#1d1d1f}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:40px}
.option{text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px}
.option img{width:120px;height:120px;border-radius:22px;box-shadow:0 4px 20px rgba(0,0,0,0.12)}
.option .small{width:32px;height:32px;border-radius:7px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.option .tiny{width:16px;height:16px;border-radius:3px}
.label{font-size:13px;font-weight:600;color:#666}
.sizes{display:flex;align-items:center;gap:12px;margin-top:4px}
</style></head><body>
<h1>MovilNova Favicon v2</h1>
<div class="grid">
  <div class="option">
    <img src="option6-bolt.svg">
    <div class="sizes"><img src="option6-bolt.svg" class="small"><img src="option6-bolt.svg" class="tiny"></div>
    <span class="label">6. Lightning Bolt</span>
  </div>
  <div class="option">
    <img src="option7-wrench.svg">
    <div class="sizes"><img src="option7-wrench.svg" class="small"><img src="option7-wrench.svg" class="tiny"></div>
    <span class="label">7. Signal Wave</span>
  </div>
  <div class="option">
    <img src="option8-dot.svg">
    <div class="sizes"><img src="option8-dot.svg" class="small"><img src="option8-dot.svg" class="tiny"></div>
    <span class="label">8. Serif m.</span>
  </div>
  <div class="option">
    <img src="option9-shield.svg">
    <div class="sizes"><img src="option9-shield.svg" class="small"><img src="option9-shield.svg" class="tiny"></div>
    <span class="label">9. Shield Check</span>
  </div>
  <div class="option">
    <img src="option10-circle.svg">
    <div class="sizes"><img src="option10-circle.svg" class="small"><img src="option10-circle.svg" class="tiny"></div>
    <span class="label">10. Clean Circle</span>
  </div>
</div>
</body></html>
